<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Shineray PK Motors </title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --red: #ff0000; --gray: #000000; --border: #000000; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gray); display: flex; flex-direction: column; height: 100vh; }
        
        header { background: rgb(0, 0, 0); border-bottom: 3px solid var(--red); padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { height: 45px; }

        .main { display: grid; grid-template-columns: 350px 1fr; gap: 20px; padding: 20px; flex: 1; overflow: hidden; }
        .card { background: #ff0000; border-radius: 8px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .card-header { padding: 15px; background: #ff0000; border-bottom: 1px solid var(--border); font-weight: bold; }
        
       
        #contactList { overflow-y: auto; flex: 1; padding: 5px; contain: content; }
        .contact-item { padding: 10px; border-bottom: 1px solid #ff0000; display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .contact-item:hover { background: #000000; }

  
        .composer { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        input[type="text"], textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        textarea { height: 150px; resize: none; }
        
        .btn { background: var(--red); color: rgb(0, 0, 0); border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn:disabled { background: #000000; cursor: not-allowed; }
        .btn:hover:not(:disabled) { background: #000000; }

        .vars { display: flex; gap: 8px; margin-bottom: 5px; }
        .var-btn { background: rgb(0, 0, 0)e2e; border: 1px solid #ff0000; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .contact-item:hover { background: #000000; }

  
        .composer { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        input[type="text"], textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        textarea { height: 150px; resize: none; }
        
        .btn { background: var(--red); color: rgb(255, 0, 0); border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn:disabled { background: #000000; cursor: not-allowed; }
        .btn:hover:not(:disabled) { background: #000000; }

        .vars { display: flex; gap: 8px; margin-bottom: 5px; }
        .var-btn { background: rgb(0, 0, 0)e2e; border: 1px solid #ff0000; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }


        #log { color:#000000 font-weight: bold; text-align: center; margin-top: 10px; min-height: 20px; }
    </style>
</head>
<body>

    <div id="status" style="font-weight: bold; color: #ff0000;">Iniciando Sistema...</div>
</header>

<div class="main">
    <div class="card">
        <div class="card-header">
           Agenda de contatos
            <input type="text" id="search" placeholder=" Filtrar por nome..." style="margin-top:10px; padding: 8px;">
        </div>
        <div id="contactList" style="font-weight: bold; color: #000000;">Aguardando Conexão</div>
    </div>
    <div class="card">
        <div class="composer">
            <img id="qrImg">
            
            <div style="background: #ff0000; padding: 15px; border-radius: 8px; border: 1px solid #000000;">
                <label style="font-weight: bold; color: #000000; font-size: 12px; display: block; margin-bottom: 5px;">NÚMERO MANUAL (DDD + NÚMERO):</label>
                <input type="text" id="manualNum" placeholder="Ex: 5516999999999">
            </div>

            <div>
                <div class="vars">
                    <button class="var-btn" onclick="addVar('{nome}')"> Inserir {nome}</button>
                </div>
                <textarea id="msg" placeholder="Olá {nome}, confira as ofertas da Shineray PK Motors!"></textarea>
            </div>

            <div style="font-size: 13px; background: #ff0000; padding: 10px; border-radius: 6px;">
                <b>Foto do Produto:</b> <input type="file" id="fileInp" accept="image/*">
            </div>

            <button class="btn" id="sendBtn" disabled onclick="executarBlast()"> INICIAR DISPARO</button>
            <div id="log"></div>
        </div>
    </div>
</div>

<script>
    const socket = io();
    let mediaData = null;
    let agendaCompleta = [];
    let selecionadosGlobal = new Set(); // Guarda os IDs selecionados para não perder na busca
    let searchTimeout;

    socket.on('qr', url => {
        const img = document.getElementById('qrImg');
        img.src = url; img.style.display = 'block';
        document.getElementById('status').innerText = 'Escaneie o QR Code no seu WhatsApp';
    });

    socket.on('ready', () => {
        document.getElementById('qrImg').style.display = 'none';
        document.getElementById('status').innerText = ' WHATSAPP CONECTADO';
        document.getElementById('status').style.color = 'green';
        document.getElementById('sendBtn').disabled = false;
        carregarAgenda();
    });

    async function carregarAgenda() {
        try {
            const res = await fetch('/contacts');
            agendaCompleta = await res.json();
            renderizarContatos(agendaCompleta);
        } catch (e) {
            document.getElementById('contactList').innerText = "Erro ao carregar contatos.";
        }
    }

    // Gerencia a seleção dos contatos
    function toggleSelecao(checkbox) {
        if (checkbox.checked) {
            selecionadosGlobal.add(checkbox.value);
        } else {
            selecionadosGlobal.delete(checkbox.value);
        }
    }

    // Renderização em massa corrigida
    function renderizarContatos(lista) {
        const listDiv = document.getElementById('contactList');
        const html = lista.map(c => {
            // Verifica se o contato já estava selecionado antes de renderizar
            const isChecked = selecionadosGlobal.has(c.id) ? 'checked' : '';
            return `
                <div class="contact-item">
                    <input type="checkbox" value="${c.id}" data-name="${c.name}" ${isChecked} onchange="toggleSelecao(this)">
                    <span>${c.name}</span>
                </div>
            `;
        }).join('');
        listDiv.innerHTML = html;
    }

    // Busca ultra-rápida com Debounce
    document.getElementById('search').addEventListener('input', function() {
        const termo = this.value.toLowerCase();
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            const filtrados = agendaCompleta.filter(c => c.name.toLowerCase().includes(termo));
            renderizarContatos(filtrados);
        }, 150);
    });

    function addVar(v) {
        const area = document.getElementById('msg');
        area.value += v;
        area.focus();
    }

    document.getElementById('fileInp').onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => mediaData = { data: ev.target.result.split(',')[1], mimetype: file.type, filename: file.name };
        reader.readAsDataURL(file);
    };

    async function executarBlast() {
        const manual = document.getElementById('manualNum').value.trim();
        const msgBase = document.getElementById('msg').value;
        const btn = document.getElementById('sendBtn');
        const logDiv = document.getElementById('log');

        btn.disabled = true;

        const disparar = async (num, texto) => {
            return fetch('/send', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ number: num, message: texto, media: mediaData })
            });
        };

        if (manual !== "") {
            logDiv.innerText = "Enviando para número manual...";
            await disparar(manual, msgBase.replace('{nome}', 'Cliente'));
            logDiv.innerText = " Envio manual finalizado!";
        } else {
            // Agora pegamos os dados direto do selecionadosGlobal
            if (selecionadosGlobal.size === 0) {
                alert('Selecione os clientes na lista!');
                btn.disabled = false;
                return;
            }

            const listaDeEnvio = Array.from(selecionadosGlobal);
            
            for (let i = 0; i < listaDeEnvio.length; i++) {
                const idContato = listaDeEnvio[i];
                // Busca o nome correspondente na agenda completa
                const contato = agendaCompleta.find(c => c.id === idContato);
                const nome = contato ? contato.name : 'Cliente';
                
                logDiv.innerText = `Enviando ${i + 1} de ${listaDeEnvio.length} para ${nome}...`;
                
                await disparar(idContato, msgBase.replace('{nome}', nome));

                // Delay Humano Aleatório (3 a 10 segundos)
                if (i < listaDeEnvio.length - 1) {
                    const delay = Math.floor(Math.random() * (10 - 3 + 1) + 3) * 1000;
                    logDiv.innerText = `Simulando humano: aguardando ${delay/1000}s...`;
                    await new Promise(r => setTimeout(r, delay));
                }
            }
            logDiv.innerText = " Todos os envios concluídos!";
        }
        btn.disabled = false;
    }
</script>
</body>
</html>
